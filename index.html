<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catosa GP - Ventas Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --red: #d21034; --bg: #0c0e10; --card: #1a1d20; --green: #00ff88; --blue: #00d4ff; --text: #f5f5f5; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--red); text-align: center; width: 280px; }
        #main-app { display: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #333; margin-bottom: 15px; }

        .time-panel { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .time-item { text-align: center; flex: 1; }
        .time-label { font-size: 0.55rem; color: #888; display: block; text-transform: uppercase; margin-bottom: 2px; }
        .time-value { font-size: 0.9rem; font-weight: bold; display: block; }

        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .top-card { background: var(--card); padding: 10px 2px; border-radius: 8px; text-align: center; border-bottom: 2px solid var(--blue); }
        .top-card span { font-size: 0.5rem; color: #888; display: block; text-transform: uppercase; }
        .top-card b { font-size: 0.8rem; color: var(--green); }

        /* PISTAS DE CARRERAS */
        .race-label { font-size: 0.6rem; color: var(--gold); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .race-track { background: #050505; border-radius: 10px; padding: 15px 0; border: 1px solid #333; position: relative; overflow: hidden; margin-bottom: 10px; height: 45px; }
        .line-meta { position: absolute; top: 0; bottom: 0; width: 1px; opacity: 0.4; z-index: 1; }
        .l-75 { left: 62.5%; border-left: 1px dashed var(--bronze); } /* 75% de 120% */
        .l-110 { left: 91.6%; border-left: 1px dashed var(--silver); } /* 110% de 120% */
        .l-120 { right: 0; width: 12px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #000 5px, #000 10px); opacity: 0.2; border-left: 2px solid var(--gold); }
        
        .truck { position: absolute; bottom: 8px; width: 60px; height: 32px; background-image: url('camion-intl.png'); background-size: contain; background-repeat: no-repeat; transition: 3s cubic-bezier(0.2, 0, 0.2, 1); z-index: 10; }
        .truck.bronce { filter: drop-shadow(0 0 8px var(--bronze)); }
        .truck.plata { filter: drop-shadow(0 0 12px var(--silver)); }
        .truck.oro { filter: drop-shadow(0 0 18px var(--gold)); }

        .btn-reporte { background: var(--blue); margin-bottom: 15px; box-shadow: 0 0 10px rgba(0, 212, 255, 0.4); border-radius: 8px; border:none; padding: 14px; font-weight: bold; cursor: pointer; color: #fff; text-transform: uppercase; width: 100%; font-size: 0.85rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }

        .progress-bg { width: 100%; height: 18px; background: #000; border-radius: 10px; border: 1px solid #444; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--red); transition: 1.5s; box-shadow: 0 0 10px var(--red); }
        
        /* PRODUCTOS TOP */
        .prod-row { display: flex; align-items: center; background: rgba(255,255,255,0.02); margin-bottom: 8px; padding: 12px; border-radius: 10px; position: relative; }
        .prod-rank-icon { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-right: 15px; width: 25px; border-left: 3px solid var(--gold); padding-left: 10px; }
        .prod-info-main { flex: 1; }
        .prod-stat-data { text-align: right; }

        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 16px !important; }
        .btn { padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; background: var(--red); text-transform: uppercase; width: 100%; }

        .client-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; justify-content: space-between; font-size: 0.8rem; }
        .semaforo { display: flex; flex-direction: column; gap: 3px; margin-right: 15px; width: 10px; }
        .light { width: 10px; height: 10px; border-radius: 50%; background: #222; }
        .light.on.verde { background: #0f0; box-shadow: 0 0 8px #0f0; }
        .light.on.ambar { background: #ff0; box-shadow: 0 0 8px #ff0; }
        .light.on.rojo { background: #f00; box-shadow: 0 0 8px #f00; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="max-height: 40px; margin-bottom: 20px;">
            <input type="text" id="u-name" placeholder="NOMBRE">
            <input type="password" id="u-pass" placeholder="PASSWORD">
            <button class="btn" onclick="login()">ENTRAR AL GP</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="logo-catosa.png" style="max-height: 20px;">
            <div style="text-align: center;"><b id="u-disp">--</b><small id="s-disp" style="color: var(--blue); display: block;">--</small></div>
            <button style="background:none; border:1px solid var(--red); color:var(--red); padding:5px; border-radius:5px;" onclick="location.reload()">SALIR</button>
        </div>

        <span class="race-label">🏁 Mi Avance (Individual)</span>
        <div class="race-track">
            <div class="line-meta l-75"></div><div class="line-meta l-110"></div><div class="line-meta l-120"></div>
            <div id="truck-ind" class="truck"></div>
        </div>

        <span class="race-label" id="suc-label">🏁 Avance Sucursal (Grupal)</span>
        <div class="race-track" style="background: #0a0a0a;">
            <div class="line-meta l-75"></div><div class="line-meta l-110"></div><div class="line-meta l-120"></div>
            <div id="truck-grp" class="truck" style="filter: hue-rotate(180deg);"></div>
        </div>

        <button class="btn-reporte" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd8lCHVlqTobNSlLxKr7b9y_kkxH9XFPPMhkAKa_eW5IaPueQ/viewform','_blank')">📝 REGISTRAR GESTIÓN / VISITA</button>

        <div class="grid">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>💰 Proyección de Comisión</h2>
                    <b id="metal" style="font-size:0.7rem; padding:4px 12px; border-radius:4px; background:#333;">S/N</b>
                </div>
                <div style="margin: 10px 0;"><label style="font-size:0.6rem; color:#888;">% COMISIÓN:</label><input type="text" id="c-pct" readonly style="color:var(--green); font-weight:bold;"></div>
                <div class="progress-bg"><div id="obj-fill" class="progress-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:1rem; font-weight:bold;"><span id="r-v" style="color:var(--green)">$0</span><span id="r-c" style="color:var(--blue)">$0</span></div>
            </div>

            <div class="card">
                <h2>📑 Cotizadora Express</h2>
                <input list="cli-cot" id="cot-cli-name" placeholder="Cliente">
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 5px;">
                    <input type="text" id="p-sku" placeholder="Parte" oninput="quickSearch(this)">
                    <input type="number" id="p-qty" value="1">
                    <input type="number" id="p-prc" placeholder="$" readonly>
                </div>
                <button class="btn" style="background:#25d366; margin-top:10px;" onclick="sendQuote('wa')">Enviar WhatsApp</button>
            </div>

            <div class="card">
                <h2>👥 Mi Cartera</h2>
                <div id="lista-cli" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            c: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1068966462&single=true&output=csv",
            p: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv"
        };
        let dbV=[], dbC=[], dbP=[], user=null;

        window.onload = () => {
            Papa.parse(L.v, { download:true, header:true, complete: r => dbV=r.data });
            Papa.parse(L.c, { download:true, header:true, complete: r => dbC=r.data });
            Papa.parse(L.p, { download:true, header:true, complete: r => dbP=r.data });
        };

        function login() {
            const n = document.getElementById('u-name').value.toUpperCase();
            const p = document.getElementById('u-pass').value.toUpperCase();
            const f = dbV.find(v => (v.Nombre||"").toUpperCase().includes(n) && n!=="");
            if(f && (p==='CATOSA2026' || p==='GP2026')){
                user=f; document.getElementById('login-screen').style.display='none';
                document.getElementById('main-app').style.display='block';
                document.getElementById('u-disp').innerText=user.Nombre;
                document.getElementById('s-disp').innerText="Sucursal: " + user.Sucursal;
                document.getElementById('suc-label').innerText = "🏁 Avance Sucursal " + user.Sucursal;
                renderApp();
            } else alert("Acceso Incorrecto");
        }

        function renderApp() {
            // INDIVIDUAL
            const vr = parseFloat(user.Ventas.replace(/[^0-9.]/g,''))||0, vm = parseFloat(user.Meta.replace(/[^0-9.]/g,''))||1;
            const pctInd = (vr/vm)*100;
            
            // GRUPAL (Promedio Sucursal)
            const sucursalData = dbV.filter(v => v.Sucursal === user.Sucursal);
            let sumPct = 0;
            sucursalData.forEach(v => {
                const v_r = parseFloat(v.Ventas.replace(/[^0-9.]/g,''))||0, v_m = parseFloat(v.Meta.replace(/[^0-9.]/g,''))||1;
                sumPct += (v_r/v_m)*100;
            });
            const pctGrp = sumPct / sucursalData.length;

            // MOVER CAMIONES (Escala 120%)
            document.getElementById('truck-ind').style.left = `calc(${Math.min(100, (pctInd/120)*100)}% - 60px)`;
            document.getElementById('truck-grp').style.left = `calc(${Math.min(100, (pctGrp/120)*100)}% - 60px)`;

            // CALCULAR COMISION SEGUN IMAGEN EXCEL (Calle)
            let factorInd = 0, nivel = "", color = "";
            if(pctInd < 75) { factorInd = 1.10; nivel = "ROJO"; color = "var(--red)"; }
            else if(pctInd < 110) { factorInd = 1.50; nivel = "BRONCE"; color = "var(--bronze)"; }
            else if(pctInd < 120) { factorInd = 1.65; nivel = "PLATA"; color = "var(--silver)"; }
            else { factorInd = 1.75; nivel = "ORO"; color = "var(--gold)"; }

            document.getElementById('c-pct').value = factorInd + "%";
            document.getElementById('r-v').innerText = "$" + Math.floor(vr).toLocaleString();
            document.getElementById('r-c').innerText = "$" + Math.floor(vr * (factorInd/100)).toLocaleString();
            document.getElementById('obj-fill').style.width = Math.min(100, (pctInd/120)*100) + "%";
            
            const b = document.getElementById('metal');
            b.innerText = nivel; b.style.background = color;

            // CARTERA
            const lc = document.getElementById('lista-cli'); lc.innerHTML='';
            dbC.filter(c => (c.Vendedor||"").toUpperCase().includes(user.Nombre.split(" ")[0])).forEach(c => {
                const d = parseInt(c.Dias)||0;
                lc.innerHTML += `<div class="client-item">
                    <div style="display:flex; align-items:center;"><div class="semaforo"><div class="light on ${d<=14?'verde':(d<=60?'ambar':'rojo')}"></div></div>
                    <div><b>${c.Cliente}</b><br><small>${d}d inactivo</small></div></div><b style="color:var(--green)">$${Math.floor(parseFloat(c.Venta_Mes)||0).toLocaleString()}</b></div>`;
            });
        }

        function quickSearch(i) {
            const m = dbP.find(p => (p.Parte||'').toUpperCase() === i.value.toUpperCase());
            if(m) document.getElementById('p-prc').value = parseFloat(m.Precio.replace(/[^0-9.]/g,''))||0;
        }

        function sendQuote(m) {
            const cli = document.getElementById('cot-cli-name').value || "Cliente";
            const sku = document.getElementById('p-sku').value;
            const prc = document.getElementById('p-prc').value;
            if(!sku || !prc) return alert("Selecciona un producto");
            let t = `*COTIZACIÓN CATOSA GP*\n*Cliente:* ${cli}\n*Parte:* ${sku}\n*Precio:* $${parseFloat(prc).toLocaleString()}\n\nQuedo a sus órdenes.`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(t)}`, '_blank');
        }
    </script>
</body>
</html>
