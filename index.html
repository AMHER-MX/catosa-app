<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa GP - Official Race</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --red: #d21034;
            --bg: #32373c;       
            --card: #1a1d20;     
            --green: #2ecc71;
            --blue: #3498db;
            --text: #f5f5f5;
            --asfalto: #181a1c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .logo { max-height: 30px; }
        h1 { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: #fff; margin: 0; text-align: center; flex: 1; }

        #status-bar { text-align: center; font-size: 0.65rem; color: #ffab00; margin-bottom: 15px; }

        /* PISTA DE CARRERAS */
        .race-track { 
            max-width: 1000px; margin: 0 auto 25px; 
            background: var(--asfalto); border-radius: 10px; padding: 20px 0; 
            border: 2px solid #333; box-shadow: inset 0 0 30px #000;
            position: relative; overflow: hidden;
        }

        .finish-line { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 30px; 
            background-image: 
                linear-gradient(45deg, #fff 25%, transparent 25%), 
                linear-gradient(-45deg, #fff 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #fff 75%),
                linear-gradient(-45deg, transparent 75%, #fff 75%);
            background-size: 15px 15px;
            background-position: 0 0, 0 7.5px, 7.5px -7.5px, -7.5px 0px;
            background-color: #000;
            opacity: 0.8; z-index: 5;
        }

        .race-lane { height: 65px; position: relative; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; }
        .vendor-name { position: absolute; left: 15px; top: 8px; font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.3); }

        .international-truck { 
            position: absolute; bottom: 10px; left: 0; 
            width: 100px; height: 45px; 
            background-image: url('camion-intl.png'); 
            background-size: contain; background-repeat: no-repeat;
            transition: all 2s cubic-bezier(0.12, 0.76, 0.44, 0.99);
            z-index: 10;
        }
        .international-truck.leader { filter: drop-shadow(0 0 12px var(--red)); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        h2 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 0; margin-bottom: 15px; }

        input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 6px; color: #fff; margin: 8px 0; box-sizing: border-box; }
        
        .comm-circle { width: 130px; height: 130px; border-radius: 50%; border: 6px solid #111; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 6px solid var(--blue); }
        .big-val { font-size: 2.1rem; color: var(--green); font-weight: bold; }

        /* CARTERA SEMÁFORO */
        .client-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .traffic-light { display: flex; flex-direction: column; gap: 4px; background: #000; padding: 6px; border-radius: 15px; width: 20px; border: 1px solid #333; margin-right: 15px; }
        .light { width: 12px; height: 12px; border-radius: 50%; opacity: 0.1; }
        .light.on { opacity: 1; box-shadow: 0 0 10px currentColor; }

        /* BOTONES DE ENVÍO */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }
        .btn-ws { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); }
        .btn-mail { background: linear-gradient(135deg, #555 0%, #333 100%); border: 1px solid #444; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-catosa.png" class="logo" onerror="this.style.display='none'">
        <h1>Catosa Official GP</h1>
        <img src="logo-international.png" class="logo" onerror="this.style.display='none'">
    </div>

    <div id="status-bar">🛰️ Syncing data...</div>

    <div class="race-track">
        <div class="finish-line"></div>
        <div id="pista-competencia"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>💰 Comisiones</h2>
            <div class="comm-circle">
                <div class="big-val" id="resCom">$0.00</div>
                <span style="font-size: 0.5rem; color:#444;">POTENCIAL</span>
            </div>
            <input type="number" id="vMonto" placeholder="Input Value" oninput="calc()">
        </div>

        <div class="card">
            <h2>📋 Cotizador</h2>
            <input type="text" id="cCliente" placeholder="Cliente...">
            <input type="text" id="cParte" placeholder="N° de Parte..." oninput="cotizar()">
            <div id="qBox" style="background:#0c0e10; padding:12px; border-radius:8px; border:1px solid #222; min-height: 60px;">
                <div id="qDesc" style="color:#555; font-size:0.75rem;">Ref: --</div>
                <div id="qTotal" style="font-size:1.6rem; color:#fff; font-weight:bold; margin-top:5px;">$0.00</div>
            </div>
            <div class="btn-group">
                <button class="btn-action btn-ws" onclick="enviar('ws')">📲 WhatsApp</button>
                <button class="btn-action btn-mail" onclick="enviar('mail')">✉️ E-mail</button>
            </div>
        </div>

        <div class="card">
            <h2>👥 Cartera Semáforo</h2>
            <div id="lista-clientes"></div>
        </div>
    </div>

    <script>
        const URL_V = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv&t=${new Date().getTime()}`;
        const URL_P = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv&t=${new Date().getTime()}`;

        let dbV = [], dbP = [], itemSel = null;

        const getVal = (obj, keyword) => {
            const keys = Object.keys(obj);
            const foundKey = keys.find(k => k.trim().toLowerCase().includes(keyword.toLowerCase()));
            return foundKey ? obj[foundKey] : null;
        };

        async function init() {
            Papa.parse(URL_V, { 
                download: true, header: true, skipEmptyLines: true,
                complete: (r) => { dbV = r.data; renderV(); } 
            });
            Papa.parse(URL_P, { 
                download: true, header: true, skipEmptyLines: true,
                complete: (r) => { 
                    dbP = r.data; 
                    document.getElementById('status-bar').innerText = "● SISTEMA SINCRONIZADO";
                    document.getElementById('status-bar').style.color = "var(--green)";
                } 
            });
        }

        function renderV() {
            const p = document.getElementById('pista-competencia');
            const l = document.getElementById('lista-clientes');
            p.innerHTML = ''; l.innerHTML = '';
            
            let maxPct = 0;
            let leaderIndex = -1;

            dbV.forEach((f, i) => {
                const ven = parseFloat(getVal(f, 'Ventas')) || 0;
                const met = parseFloat(getVal(f, 'Meta')) || 1;
                const pct = ven / met;
                if(pct > maxPct) { maxPct = pct; leaderIndex = i; }
            });

            dbV.forEach((f, i) => {
                const nom = getVal(f, 'Nombre');
                const ven = parseFloat(getVal(f, 'Ventas')) || 0;
                const met = parseFloat(getVal(f, 'Meta')) || 1;
                
                if(nom) {
                    const pct = Math.min(100, (ven/met)*100);
                    p.innerHTML += `
                        <div class="race-lane">
                            <div class="vendor-name">${nom.toUpperCase()}</div>
                            <div class="international-truck ${i === leaderIndex && pct > 0 ? 'leader' : ''}" style="left:calc(${pct}% - 100px)"></div>
                        </div>`;
                }

                const cli = getVal(f, 'Cliente');
                const d = parseInt(getVal(f, 'Dias')) || 0;

                if(cli) {
                    l.innerHTML += `
                        <div class="client-row">
                            <div class="traffic-light">
                                <div class="light ${d <= 14 ? 'on' : ''}" style="color: #0f0; background: #0f0;"></div>
                                <div class="light ${d > 14 && d <= 60 ? 'on' : ''}" style="color: #ff0; background: #ff0;"></div>
                                <div class="light ${d > 60 ? 'on' : ''}" style="color: #f00; background: #f00;"></div>
                            </div>
                            <div style="flex:1;">
                                <div style="font-size:13px; font-weight:bold;">${cli}</div>
                                <div style="font-size:10px; color:#555;">Inactividad: ${d} días</div>
                            </div>
                        </div>`;
                }
            });
        }

        function cotizar() {
            const pIn = document.getElementById('cParte').value.trim().toUpperCase();
            const cIn = document.getElementById('cCliente').value.trim().toUpperCase();
            itemSel = dbP.find(x => {
                const pEx = (getVal(x, 'Parte') || "").toString().toUpperCase();
                const cEx = (getVal(x, 'Especial') || "").toString().toUpperCase();
                return pEx === pIn && (cEx === cIn || cEx === "");
            });
            if(itemSel) {
                const pre = parseFloat(getVal(itemSel, 'Precio')) || 0;
                document.getElementById('qDesc').innerText = getVal(itemSel, 'Descripcion') || getVal(itemSel, 'Parte');
                document.getElementById('qTotal').innerText = "$" + pre.toLocaleString();
            } else {
                document.getElementById('qDesc').innerText = "Refacción: --";
                document.getElementById('qTotal').innerText = "$0.00";
            }
        }

        function calc() {
            const com = (document.getElementById('vMonto').value * 0.25) * 0.03;
            document.getElementById('resCom').innerText = "$" + com.toLocaleString(undefined, {maximumFractionDigits:0});
        }

        function enviar(tipo) {
            if(!itemSel) return;
            const desc = document.getElementById('qDesc').innerText;
            const total = document.getElementById('qTotal').innerText;
            const cliente = document.getElementById('cCliente').value || "Cliente";
            
            const msg = `*CATOSA - Cotización*\n\nCliente: ${cliente}\nRefacción: ${desc}\nTotal: ${total}\n\nQuedo a tus órdenes.`;

            if(tipo === 'ws') {
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            } else {
                window.location.href = `mailto:?subject=Cotización Catosa&body=${encodeURIComponent(msg.replace(/\*/g,''))}`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
