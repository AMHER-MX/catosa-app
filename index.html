<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catosa Ultra GP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #d21034;
            --bg: #222629;       
            --card: #1a1d20;     
            --neon-green: #00ff88;
            --neon-blue: #00d4ff;
            --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #333; margin-bottom: 15px; }
        .logo { max-height: 30px; }
        h1 { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: #fff; margin: 0; flex: 1; text-align: center; }

        /* STATUS BAR */
        #status-bar { text-align: center; font-size: 0.65rem; padding: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 5px; color: #ffab00; font-weight: bold; }

        /* TRACK */
        .track-container { 
            background: linear-gradient(180deg, #0f1113 0%, #1a1d20 100%);
            border-radius: 12px; padding: 15px; margin-bottom: 20px;
            border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lane { height: 50px; position: relative; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; }
        .truck-info { position: absolute; left: 10px; top: 2px; font-size: 10px; font-weight: bold; color: var(--neon-blue); }
        .truck-pro { 
            position: absolute; bottom: 8px; left: 0; width: 75px; height: 22px; 
            background: linear-gradient(90deg, var(--primary), #ff4d4d);
            border-radius: 3px; transition: all 2s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold;
            box-shadow: 0 0 15px rgba(210, 16, 52, 0.5);
        }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1100px; margin: 0 auto; }
        .card { 
            background: var(--card); border-radius: 12px; padding: 20px; 
            border: 1px solid #333; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        h2 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 0; }

        /* COMISIONES */
        .comm-circle { 
            width: 140px; height: 140px; border-radius: 50%; border: 6px solid #111;
            margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-top: 6px solid var(--neon-blue); box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }
        .big-val { font-size: 2rem; color: var(--neon-green); font-weight: bold; }

        /* INPUTS */
        input { 
            width: 100%; background: #000; border: 1px solid #333; padding: 12px; 
            border-radius: 6px; color: #fff; margin: 10px 0; box-sizing: border-box;
        }

        /* SEMAFORO */
        .client-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .lights { display: flex; flex-direction: column; gap: 3px; background: #000; padding: 4px; border-radius: 15px; border: 1px solid #333; }
        .l-dot { width: 12px; height: 12px; border-radius: 50%; opacity: 0.1; }
        .l-dot.on { opacity: 1; box-shadow: 0 0 8px currentColor; }

        .btn-ws { 
            width: 100%; padding: 15px; border-radius: 8px; border: none;
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-catosa.png" class="logo" onerror="this.style.display='none'">
        <h1>CATOSA PERFORMANCE GP</h1>
        <img src="logo-international.png" class="logo" onerror="this.style.display='none'">
    </div>

    <div id="status-bar">🛰️ ESTABLECIENDO CONEXIÓN CON SATÉLITE...</div>

    <div class="track-container">
        <div id="pista"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Comisiones & Metas</h2>
            <div class="comm-circle">
                <div class="big-val" id="resCom">$0.00</div>
                <span style="font-size: 0.6rem; color:#444;">POTENCIAL</span>
            </div>
            <input type="number" id="vMonto" placeholder="Venta Total ($)" oninput="calc()">
        </div>

        <div class="card">
            <h2>Cotizador Inteligente</h2>
            <input type="text" id="cCliente" placeholder="Nombre del Cliente...">
            <input type="text" id="cParte" placeholder="Número de Parte..." oninput="cotizar()">
            <div id="qBox" style="background:#0c0e10; padding:12px; border-radius:8px; border:1px solid #222;">
                <div id="qDesc" style="color:#555; font-size:0.75rem;">Ref: --</div>
                <div id="qTotal" style="font-size:1.6rem; color:#fff; font-weight:bold; margin-top:5px;">$0.00</div>
            </div>
            <button class="btn-ws" onclick="enviar()">📲 Enviar WhatsApp</button>
        </div>

        <div class="card">
            <h2>Monitor de Cartera</h2>
            <div id="lista"></div>
        </div>
    </div>

    <script>
        // FORZADO DE ENLACES CON BYPASS DE CACHÉ
        const t = new Date().getTime();
        const URL_V = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv&cache=${t}`;
        const URL_P = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv&cache=${t}`;

        let dbV = [], dbP = [], itemSel = null;

        // Función Blindada: Lee por nombre o por posición de columna
        const val = (obj, name, index) => {
            const keys = Object.keys(obj);
            const found = keys.find(k => k.trim().toLowerCase() === name.toLowerCase());
            return found ? obj[found] : obj[keys[index]];
        };

        async function init() {
            // Canal 1: Vendedores
            Papa.parse(URL_V, {
                download: true, header: true, skipEmptyLines: true,
                complete: (r) => { 
                    dbV = r.data; 
                    renderV(); 
                    check();
                },
                error: () => { document.getElementById('status-bar').innerText = "❌ ERROR EN CANAL VENDEDORES"; }
            });

            // Canal 2: Productos
            Papa.parse(URL_P, {
                download: true, header: true, skipEmptyLines: true,
                complete: (r) => { 
                    dbP = r.data; 
                    check();
                },
                error: () => { document.getElementById('status-bar').innerText = "❌ ERROR EN CANAL PRODUCTOS"; }
            });
        }

        function check() {
            if(dbV.length > 0 && dbP.length > 0) {
                const s = document.getElementById('status-bar');
                s.innerText = "✅ SISTEMA ULTRA SINCRONIZADO";
                s.style.color = "var(--neon-green)";
            }
        }

        function renderV() {
            const p = document.getElementById('pista'), l = document.getElementById('lista');
            p.innerHTML = ''; l.innerHTML = '';
            
            dbV.forEach(f => {
                const nom = val(f, 'Nombre', 0), ven = parseFloat(val(f, 'Ventas', 1)) || 0, met = parseFloat(val(f, 'Meta', 2)) || 1;
                if(nom) {
                    const pct = Math.min(100, (ven/met)*100);
                    p.innerHTML += `<div class="lane"><div class="truck-info">${nom.toUpperCase()}</div><div class="truck-pro" style="left:calc(${pct}% - 75px)">INTL</div></div>`;
                }

                const cli = val(f, 'Cliente', 3), d = parseInt(val(f, 'DiasSinComprar', 4)) || 0;
                if(cli) {
                    l.innerHTML += `
                        <div class="client-item">
                            <div class="lights">
                                <div class="l-dot ${d <= 14 ? 'on' : ''}" style="color:#0f0; background:#0f0;"></div>
                                <div class="l-dot ${d > 14 && d <= 60 ? 'on' : ''}" style="color:#ff0; background:#ff0;"></div>
                                <div class="l-dot ${d > 60 ? 'on' : ''}" style="color:#f00; background:#f00;"></div>
                            </div>
                            <div style="flex:1; margin-left:15px; font-size:12px;">
                                <b>${cli}</b><br><span style="color:#444">${d} días sin comprar</span>
                            </div>
                        </div>`;
                }
            });
        }

        function cotizar() {
            const part = document.getElementById('cParte').value.trim().toUpperCase();
            const cli = document.getElementById('cCliente').value.trim().toUpperCase();
            itemSel = dbP.find(x => {
                const pEx = (val(x, 'Parte', 0) || "").toString().toUpperCase();
                const cEx = (val(x, 'Cliente_Especial', 3) || "").toString().toUpperCase();
                return pEx === part && (cEx === cli || cEx === "");
            });
            if(itemSel) {
                const pre = parseFloat(val(itemSel, 'Precio', 1)) || 0;
                document.getElementById('qDesc').innerText = val(itemSel, 'Descripcion', 2) || val(itemSel, 'Parte', 0);
                document.getElementById('qTotal').innerText = "$" + pre.toLocaleString();
            }
        }

        function calc() {
            const com = (document.getElementById('vMonto').value * 0.25) * 0.03;
            document.getElementById('resCom').innerText = "$" + com.toLocaleString(undefined, {maximumFractionDigits:0});
        }

        function enviar() {
            if(!itemSel) return;
            const msg = encodeURIComponent(`*CATOSA Ultra GP*\nRef: ${document.getElementById('qDesc').innerText}\nTotal: ${document.getElementById('qTotal').innerText}`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        window.onload = init;
    </script>
</body>
</html>
