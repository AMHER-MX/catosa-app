<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catosa GP - Executive World Cup v2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --pitch: #1a472a; 
            --pitch-light: #2d5a3f; 
            --gold: #ffd700; 
            --grass: #00ff88; 
            --card: #161b22; 
            --text: #ffffff; 
            --red: #ff4b2b; 
            --blue: #00d4ff;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0d1117; 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
            overflow-x: hidden; 
        }

        /* LOGIN WORLD CUP */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { 
            background: var(--card); padding: 35px; border-radius: 20px; 
            border: 2px solid var(--gold); text-align: center; width: 300px; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); 
        }
        .login-box input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }

        #main-app { display: none; max-width: 1600px; margin: 0 auto; }

        /* TOP BAR */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: rgba(0,0,0,0.4); border-radius: 15px; margin-bottom: 15px; border: 1px solid #333;
        }
        .role-badge { font-size: 0.7rem; font-weight: 900; color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; border-radius: 6px; text-transform: uppercase; }
        .btn-salir { background: none; border: 1px solid var(--red); color: var(--red); padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 900; }

        /* PANEL TIEMPO */
        .time-panel { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            background: #000; border-radius: 12px; padding: 15px; margin-bottom: 15px; 
            border-bottom: 3px solid var(--grass); 
        }
        .time-item { text-align: center; }
        .time-label { font-size: 0.55rem; color: var(--grass); display: block; text-transform: uppercase; font-weight: bold; }
        .time-value { font-family: 'Courier New', monospace; font-size: 1rem; font-weight: bold; }

        /* KPIS */
        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .top-card { 
            background: var(--card); padding: 12px; border-radius: 15px; text-align: center; 
            border-top: 3px solid var(--blue);
        }
        .top-card span { font-size: 0.5rem; color: #888; display: block; text-transform: uppercase; margin-bottom: 5px; }
        .top-card b { font-size: 0.9rem; color: #fff; }

        /* PISTA DE CARRERAS (ESTADIO) */
        .race-track { 
            background: linear-gradient(90deg, var(--pitch) 50%, var(--pitch-light) 50%);
            background-size: 60px 100%;
            border: 2px solid #fff; border-radius: 12px; position: relative; overflow: hidden; margin-bottom: 15px;
            padding: 10px 0;
        }
        .porteria-final { position: absolute; right: 0; top: 0; bottom: 0; width: 40px; background: rgba(255,255,255,0.1); border-left: 3px dashed #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 5; }
        .lane { height: 38px; position: relative; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .v-name { width: 100px; font-size: 0.55rem; color: #fff; padding-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; text-shadow: 1px 1px 2px #000; z-index: 6; }
        
        .line-meta { position: absolute; top: 0; bottom: 0; width: 1px; opacity: 0.5; z-index: 1; }
        .l-85 { left: 70%; border-left: 1px dashed var(--bronze); }
        .l-100 { left: 83%; border-left: 1px dashed #fff; }

        .truck { 
            position: absolute; width: 32px; height: 32px; 
            background-image: url('https://cdn-icons-png.flaticon.com/512/53/53283.png'); 
            background-size: contain; background-repeat: no-repeat; filter: invert(1);
            transition: 2s cubic-bezier(0.2, 0, 0.2, 1); z-index: 10; 
        }
        .truck.bronce { filter: drop-shadow(0 0 8px var(--bronze)) sepia(1); }
        .truck.plata { filter: drop-shadow(0 0 8px var(--silver)); }
        .truck.oro { filter: drop-shadow(0 0 12px var(--gold)) sepia(1) saturate(10); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; }
        h2 { font-size: 0.8rem; border-bottom: 1px solid var(--grass); padding-bottom: 10px; margin-bottom: 15px; color: var(--grass); text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }

        /* TABLAS Y LISTAS */
        .client-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.75rem; justify-content: space-between; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .dot.verde { background: #0f0; box-shadow: 0 0 8px #0f0; }
        .dot.ambar { background: #ff0; box-shadow: 0 0 8px #ff0; }
        .dot.rojo { background: #f00; box-shadow: 0 0 8px #f00; }

        .btn-action { background: linear-gradient(to bottom, #2ecc71, #27ae60); color: #fff; border: none; border-radius: 8px; padding: 10px 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        select, .input-compact { background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; width: 100%; margin-bottom: 10px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--grass); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <img src="logo-catosa.png" style="height: 40px; margin-bottom: 20px;">
            <h3 style="color:var(--gold); margin-top:0;">GERENCIA WORLD CUP</h3>
            <input type="text" id="u-role" placeholder="USUARIO">
            <input type="password" id="u-pass" placeholder="CONTRASEÑA">
            <button class="btn-action" style="width:100%" onclick="login()">ENTRAR A LA CANCHA</button>
        </div>
    </div>

    <div id="main-app">
        <div class="top-bar">
            <img src="logo-catosa.png" style="height: 25px;">
            <div id="role-display" class="role-badge">--</div>
            <button class="btn-salir" onclick="location.reload()">SALIR</button>
        </div>

        <div class="time-panel">
            <div class="time-item"><span class="time-label">CORTE HOY</span><span class="time-value" id="val-hoy">--</span></div>
            <div class="time-item" style="border-left: 1px solid #333; border-right: 1px solid #333;"><span class="time-label">TIEMPO RESTANTE</span><span class="time-value" id="val-dias" style="color: var(--red);">--</span></div>
            <div class="time-item"><span class="time-label">FALTA P/ ORO</span><span class="time-value" id="val-falta-oro" style="color: var(--gold);">$0</span></div>
        </div>

        <div class="top-stats">
            <div class="top-card"><span>Venta Total</span><b id="g-v">$0</b></div>
            <div class="top-card"><span>Faltante Meta</span><b id="g-falta" style="color:var(--red)">$0</b></div>
            <div class="top-card"><span>Avance Plata</span><b id="g-p-plata" style="color:var(--blue)">0%</b></div>
            <div class="top-card"><span>Avance Oro</span><b id="g-p-oro" style="color:var(--gold)">0%</b></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
            <select id="f-suc" onchange="render()"><option value="TODAS">ESTADIO: TODOS</option></select>
            <select id="f-vend" onchange="render()"><option value="TODOS">JUGADOR: TODOS</option></select>
            <button class="btn-action" onclick="exportBBD()">📥 EXPORTAR BBD</button>
        </div>

        <div class="race-track">
            <div class="porteria-final">🥅</div>
            <div class="line-meta l-85"></div><div class="line-meta l-100"></div>
            <div id="pista"></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📈 RENDIMIENTO GRÁFICO</h2>
                <canvas id="salesChart" style="max-height: 250px;"></canvas>
            </div>

            <div class="card">
                <h2>📋 ÚLTIMOS PROSPECTOS (BBD)</h2>
                <div id="bbd-list" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>📦 MONITOR DE ALMACÉN</h2>
                <input type="text" class="input-compact" placeholder="Buscar SKU o Marca..." oninput="checkInventory(this.value)">
                <div id="inv-res" style="max-height: 250px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>🔥 TOP 10 PRODUCTOS</h2>
                <div id="top-prod-list" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>👥 CARTERA SEMÁFORO</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:10px;">
                    <select id="f-col-car" onchange="render()"><option value="TODOS">TODOS</option><option value="VERDE">AL DÍA</option><option value="AMBAR">INACTIVO</option><option value="ROJO">CRÍTICO</option></select>
                    <input type="text" id="f-cli-car" class="input-compact" placeholder="Buscar cliente..." oninput="render()">
                </div>
                <div id="cli-list" style="max-height: 250px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h2>🏆 EFECTIVIDAD POR ASESOR</h2>
                <div id="rank-list" style="max-height: 250px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const L = {
            v: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=0&single=true&output=csv",
            c: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1068966462&single=true&output=csv",
            s: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=480185164&single=true&output=csv",
            p: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1610979668&single=true&output=csv",
            det: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXRBcfvzRWWgd4GI6OZ2CI4fPXdDzkQIucSNCb_1lZhKW9kmBVcXCFx19L5kdTCMEy0d9Yy5GOttRH/pub?gid=1262272182&single=true&output=csv"
        };
        let dbV=[], dbC=[], dbS=[], dbP=[], dbD=[], myChart=null;

        const parseEx = (v) => { if(!v) return 0; let n = v.toString().replace(/\$/g, '').trim(); if(n.includes('.') && n.includes(',')) n = n.replace(/\./g, '').replace(',', '.'); else if(n.includes(',')) n = n.replace(',', '.'); return parseFloat(n) || 0; };
        const fM = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', minimumFractionDigits: 0 }).format(n);

        function login() {
            const u = document.getElementById('u-role').value.toUpperCase(), p = document.getElementById('u-pass').value;
            if((u==='GERENTE'||u==='DIRECTOR') && (p==='CATOSA2026'||p==='MASTER2026')) {
                document.getElementById('login-screen').style.display='none'; document.getElementById('main-app').style.display='block';
                document.getElementById('role-display').innerText = u; loadData();
            } else alert("ACCESO DENEGADO - REVISA TUS CREDENCIALES");
        }

        function loadData() {
            Papa.parse(L.p, { download:true, header:true, complete: r => {
                dbP = r.data;
                Papa.parse(L.v, { download:true, header:true, complete: r => { dbV=r.data; fillFilters(); render(); } });
                Papa.parse(L.c, { download:true, header:true, complete: r => { dbC=r.data; render(); } });
                Papa.parse(L.s, { download:true, header:true, complete: r => { dbS=r.data; render(); } });
                Papa.parse(L.det, { download:true, header:true, complete: r => { dbD=r.data; calcTopProducts(); } });
            }});
        }

        function fillFilters() {
            const s = document.getElementById('f-suc'), v = document.getElementById('f-vend');
            [...new Set(dbV.map(x=>x.Sucursal))].filter(x=>x).forEach(x=>s.innerHTML+=`<option value="${x}">${x}</option>`);
            dbV.filter(x=>x.Nombre).forEach(x=>v.innerHTML+=`<option value="${x.Nombre}">${x.Nombre}</option>`);
        }

        function render() {
            const fs = document.getElementById('f-suc').value, fv = document.getElementById('f-vend').value;
            const pista = document.getElementById('pista'); pista.innerHTML = '';
            let tv=0, tm=0, labs=[], vdat=[], mdat=[], ranking={};

            const hoy = new Date(), uDia = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate();
            document.getElementById('val-hoy').innerText = hoy.toLocaleDateString('es-MX', {day:'numeric', month:'short'}).toUpperCase();
            document.getElementById('val-dias').innerText = (uDia - hoy.getDate() + 1) + " DÍAS";

            dbV.filter(v => v.Nombre && (fs==='TODAS'||v.Sucursal===fs) && (fv==='TODOS'||v.Nombre===fv)).forEach(v => {
                const ven = parseEx(v.Ventas), met = parseEx(v.Meta) || 1;
                tv += ven; tm += met;
                const pct = (ven/met)*100, pos = Math.min(100, (pct/120)*100);
                let rc = pct>=115 ? 'oro' : (pct>=100 ? 'plata' : (pct>=85 ? 'bronce' : ''));
                pista.innerHTML += `<div class="lane"><small class="v-name">${v.Nombre}</small><div class="truck ${rc}" style="left:calc(${pos}% - 35px)"></div></div>`;
                labs.push(v.Nombre.split(" ")[0]); vdat.push(ven); mdat.push(met);
            });

            document.getElementById('g-v').innerText = fM(tv);
            document.getElementById('g-falta').innerText = fM(Math.max(0, tm - tv));
            document.getElementById('g-p-plata').innerText = ((tv/tm)*100 || 0).toFixed(1) + "%";
            document.getElementById('g-p-oro').innerText = ((tv/(tm*1.15))*100 || 0).toFixed(1) + "%";
            document.getElementById('val-falta-oro').innerText = fM(Math.max(0, (tm*1.15) - tv));

            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('salesChart'), { 
                type:'bar', 
                data:{ labels:labs, datasets:[{label:'Venta', data:vdat, backgroundColor:'#00ff88'},{label:'Meta', data:mdat, backgroundColor:'#333'}] }, 
                options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, grid:{color:'#222'}}}} 
            });

            const bl = document.getElementById('bbd-list'); bl.innerHTML = '';
            dbS.filter(s => fv==='TODOS'||s.Vendedor===fv).slice().reverse().slice(0,12).forEach(s => {
                bl.innerHTML += `<div class="client-item" style="flex-direction:column; align-items:flex-start;"><b>⚽ ${s.Cliente}</b><small style="color:var(--blue)">👤 ${s.Contacto || '-'} | 📞 ${s.Telefono || '-'}</small><small style="color:#666">Asesor: ${s.Vendedor}</small></div>`;
            });

            const cl = document.getElementById('cli-list'), fCol = document.getElementById('f-col-car').value, fCli = document.getElementById('f-cli-car').value.toLowerCase();
            cl.innerHTML = '';
            dbC.filter(c => (fs==='TODAS'||c.Sucursal===fs) && (fv==='TODOS'||c.Vendedor===fv)).forEach(c => {
                const d = parseInt(c.Dias)||0;
                const match = (fCol==='TODOS'||(fCol==='VERDE'&&d<=14)||(fCol==='AMBAR'&&d>14&&d<=60)||(fCol==='ROJO'&&d>60));
                if(match && c.Cliente.toLowerCase().includes(fCli)) {
                    if(!ranking[c.Vendedor]) ranking[c.Vendedor] = 0; ranking[c.Vendedor]++;
                    let col = d > 60 ? 'rojo' : (d > 14 ? 'ambar' : 'verde');
                    cl.innerHTML += `<div class="client-item"><div><span class="dot ${col}"></span><b>${c.Cliente}</b></div><b style="color:var(--grass)">${fM(parseEx(c.Venta_Mes))}</b></div>`;
                }
            });

            const rl = document.getElementById('rank-list'); rl.innerHTML = '';
            Object.entries(ranking).sort((a,b)=>b[1]-a[1]).forEach(([n,c],i) => {
                rl.innerHTML += `<div class="client-item"><span><b>${i+1}.</b> ${n}</span><b style="color:var(--gold)">${c} Ctas</b></div>`;
            });
        }

        function checkInventory(q) {
            const box = document.getElementById('inv-res'); if(!q) { box.innerHTML=""; return; }
            let list = dbP.filter(p => (p.Parte||'').toUpperCase().includes(q.toUpperCase()) || (p.Marca||'').toUpperCase().includes(q.toUpperCase()));
            box.innerHTML = '';
            list.slice(0,15).forEach(p => {
                const qty = parseInt(p.Existencia)||0;
                box.innerHTML += `<div class="client-item"><div><b>${p.Parte}</b><br><small>${p.Marca}</small></div><b style="color:${qty<=0?'var(--red)':'var(--grass)'}">${qty} pz</b></div>`;
            });
        }

        function calcTopProducts() {
            const list = document.getElementById('top-prod-list'); 
            let counts = {};
            dbD.forEach(v => { const p = (v.Parte||v.SKU||"").toString().trim().toUpperCase(); if(p && p !== "PARTE") counts[p] = (counts[p]||0) + parseInt(v.Cantidad||1); });
            const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
            list.innerHTML = '';
            sorted.forEach(([sku, qty], i) => {
                const sInfo = dbP.find(p => (p.Parte||"").toString().trim().toUpperCase() === sku);
                const sQty = sInfo ? parseInt(sInfo.Existencia) : 0;
                list.innerHTML += `<div class="client-item"><div><b style="color:var(--gold)">#${i+1}</b> ${sku}</div><div style="text-align:right"><b>${qty} vend.</b><br><small style="color:${sQty<=5?'var(--red)':'var(--grass)'}">${sQty} stock</small></div></div>`;
            });
        }

        function exportBBD() { let csv = "\uFEFFVendedor,Cliente,Contacto,Telefono,Correo\n"; dbS.forEach(s => csv += `"${s.Vendedor}","${s.Cliente}","${s.Contacto}","${s.Telefono}","${s.Correo}"\n`); const blob = new Blob([csv], {type:'text/csv;charset=utf-8'}); const link = document.createElement("a"); link.href=URL.createObjectURL(blob); link.download="BBD_Prospectos_Catosa.csv"; link.click(); }
    </script>
</body>
</html>
